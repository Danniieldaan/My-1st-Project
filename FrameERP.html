.csel{display:flex;align-items:center;gap:6px;background:#f0f4ff;border:1px solid #cddfff;border-radius:var(--r);padding:4px 7px;font-size:12px}.csel .cx{cursor:pointer;color:var(--txt3);font-size:14px;margin-left:auto;padding:0 4px}.csel .cx:hover{color:var(--rd)}
.pstage{display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid var(--bd2);font-size:12px}
.pstage:last-child{border-bottom:none}.psname{width:120px;font-weight:600}.psart{flex:1;display:flex;flex-wrap:wrap;gap:3px}.psart span{background:#f0f4ff;padding:1px 6px;border-radius:2px;font-size:11px;color:var(--bl)}.psamt{width:70px;text-align:right;font-weight:700}.psact{width:50px;text-align:right}
@media print{body{overflow:visible;height:auto}#tnav,#sb,.ph,.btn,.ptb,.rn,.mof{display:none!important}#main{overflow:visible}#content{padding:0}.pnl{margin:0;border:none;border-radius:0;page-break-inside:avoid}}

<script>
const STAGES=[{key:'WoodCut',label:'Wood Cut'},{key:'WoodJoin',label:'Wood Join'},{key:'Stretch',label:'Stretch & Tape'},{key:'FrameCut',label:'Frame Cut'},{key:'FrameJoin',label:'Frame Join'},{key:'GlassCut',label:'Glass Cut'},{key:'Assembly',label:'Assembly'}];
const SL=Object.fromEntries(STAGES.map(s=>[s.key,s.label]));
const FRAME_STAGES={'Stretched Canvas':['WoodCut','WoodJoin','Stretch'],'Floating Frame':['WoodCut','WoodJoin','FrameCut','FrameJoin','Assembly'],'Glass Frame':['WoodCut','WoodJoin','Stretch','FrameCut','FrameJoin','GlassCut','Assembly']};
const FTYPES=['Stretched Canvas','Floating Frame','Glass Frame'];
const PMETHODS=['Bank Transfer','Cash','Cheque','POS','USSD'];
const PRICE={Frame:{Small:15000,Medium:28000,Large:55000}};
const CM={Small:{WoodCut:100,WoodJoin:100,Stretch:100,FrameCut:100,FrameJoin:100,GlassCut:100,Assembly:100},Medium:{WoodCut:125,WoodJoin:125,Stretch:150,FrameCut:125,FrameJoin:125,GlassCut:125,Assembly:100},Large:{WoodCut:150,WoodJoin:150,Stretch:200,FrameCut:150,FrameJoin:150,GlassCut:150,Assembly:100}};
function sTier(w,h){const W=w||0,H=h||0;if(W<60&&H<90)return'Small';if(W>=60&&W<=70&&H>=90&&H<=140)return'Medium';if(W>=80&&H>=160)return'Large';const A=W*H;return A<=5400?'Small':A<=9800?'Medium':'Large';}
function iPrice(it){return((PRICE.Frame||{})[sTier(it.width,it.height)]||0)*(it.qty||1);}
function gComm(tier,sk){return(CM[tier]||CM.Small)[sk]||0;}
function spComm(tr){const job=DB.items.find(j=>j.id===tr.jid);if(!job)return{each:0,tier:'Small',total:0,names:[]};const tier=sTier(job.width,job.height);const total=gComm(tier,tr.sk);const names=tr.artisans?tr.artisans.split(',').map(s=>s.trim()).filter(Boolean):[];return{each:names.length?Math.floor(total/names.length):total,tier,total,names};}
function effDate(tr){return tr.dateOverride||tr.date;}
function wkRange(){const n=new Date(),d=n.getDay();const mo=new Date(n);mo.setDate(n.getDate()-(d===0?6:d-1));const su=new Date(mo);su.setDate(mo.getDate()+6);return{mo,su};}
function isWk(ds){const{mo,su}=wkRange(),d=new Date(ds);return d>=mo&&d<=su;}
function jStatus(jid){const entries=DB.tracker.filter(t=>t.jid===jid);if(!entries.length)return'Queued';const done=entries.filter(t=>t.date).map(t=>t.sk);if(done.length===0)return'Queued';if(done.includes('Assembly')&&entries.find(t=>t.sk==='Assembly'&&t.date))return'Complete';return SL[done[done.length-1]]||'In Progress';}
function jDone(jid){const entries=DB.tracker.filter(t=>t.jid===jid);if(!entries.length)return false;return entries.every(t=>t.date);}
const DB={customers:[{id:1,name:'Adaeze Okafor',phone:'08012345678',email:'ada@example.com',a1:'12 Lekki Phase 1',a2:'',a3:'Lagos',post:'100001',vat:'',credit:500000,bal:0,rep:''},{id:2,name:'Emeka Nwosu',phone:'07098765432',email:'emeka@nwosu.com',a1:'45 GRA',a2:'',a3:'Port Harcourt',post:'500001',vat:'',credit:300000,bal:30000,rep:''},{id:3,name:'Fatima Aliyu',phone:'09011112222',email:'fatima@aliyu.com',a1:'Plot 5 Maitama',a2:'',a3:'Abuja',post:'900001',vat:'',credit:750000,bal:0,rep:''}],quotes:[{id:1,cid:1,date:'2026-06-10',exp:'2026-06-30',ref:'',disc:0,stat:'In Progress',msg:'CONDITIONS\n- 80% deposit required.\n- Not liable for delays beyond our control.'},{id:2,cid:2,date:'2026-06-18',exp:'2026-06-30',ref:'',disc:0,stat:'Quoted',msg:''},{id:3,cid:3,date:'2026-06-20',exp:'2026-06-30',ref:'',disc:0,stat:'Completed',msg:''}],items:[{id:1,qid:1,type:'Frame',ft:'Floating Frame',qty:1,unit:'cm',width:145,height:160,disc:0},{id:2,qid:1,type:'Frame',ft:'Stretched Canvas',qty:1,unit:'cm',width:55,height:75,disc:0},{id:3,qid:2,type:'Frame',ft:'Stretched Canvas',qty:1,unit:'cm',width:80,height:120,disc:0},{id:4,qid:3,type:'Frame',ft:'Glass Frame',qty:1,unit:'cm',width:90,height:170,disc:0}],tracker:[{id:1,jid:1,sk:'WoodCut',artisans:'Kunle',date:'2026-06-19',dateOverride:null},{id:2,jid:1,sk:'WoodJoin',artisans:'Kunle',date:'2026-06-19',dateOverride:null},{id:3,jid:1,sk:'FrameCut',artisans:'Seun',date:'2026-06-23',dateOverride:null},{id:4,jid:1,sk:'FrameJoin',artisans:'Seun',date:'2026-06-23',dateOverride:null},{id:5,jid:2,sk:'WoodCut',artisans:'Kunle',date:'2026-06-24',dateOverride:null},{id:6,jid:2,sk:'GlassCut',artisans:'Tunde',date:'2026-06-25',dateOverride:null},{id:7,jid:2,sk:'Assembly',artisans:'Seun',date:'2026-06-25',dateOverride:null}],receipts:[],salesReps:['Oyindamola','Kunle','Seun','Tunde','Bello','Chidi','Yemi'],ids:{c:4,q:4,i:5,t:8,r:1}};
const nid=k=>DB.ids[k]++;
function qT(qid){const its=DB.items.filter(i=>i.qid===qid);const sub=its.reduce((s,i)=>s+iPrice(i),0);const q=DB.quotes.find(x=>x.id===qid)||{};const idisc=its.reduce((s,i)=>s+(i.disc||0),0);const qdisc=q.disc||0;const totalDisc=idisc+qdisc;const grand=sub-totalDisc;return{sub,idisc,qdisc,totalDisc,grand};}
const fmt=n=>'\u20a6'+Number(n||0).toLocaleString('en-NG',{minimumFractionDigits:2});
const fd=d=>d?new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
const fdl=d=>d?new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'\u2014';
const sc=s=>({Quoted:'ssn','In Progress':'spr',Completed:'sco'}[s]||'ssn');
const tc=t=>({Small:'ssm',Medium:'smd',Large:'slg'}[t]||'ssm');
function set(h){document.getElementById('content').innerHTML=h;}
const SBs={dashboard:[{lbl:'Overview',items:[{i:'\u229e',t:'Dashboard',p:'dashboard'}]}],customers:[{lbl:'Customers',items:[{i:'+',t:'Add a Customer',p:'cust_new'},{i:'\u2630',t:'Customer List',p:'customers'}]}],quotes:[{lbl:'Transactions',items:[{i:'+',t:'Process Quote',p:'quote_new'},{i:'\u2630',t:'All Quotes',p:'quotes'}]}],receipts:[{lbl:'Receipts',items:[{i:'+',t:'New Receipt',p:'receipt_new'},{i:'\u2630',t:'All Receipts',p:'receipts'}]}],production:[{lbl:'Shop Floor',items:[{i:'\u2630',t:'Production Tracker',p:'production'}]}],payroll:[{lbl:'Payroll',items:[{i:'\u20a6',t:'Weekly Payslips',p:'payroll'}]}],settings:[{lbl:'Administration',items:[{i:'\u2699',t:'Settings',p:'settings'}]}],matrix:[{lbl:'Reference',items:[{i:'\u229e',t:'Commission Matrix',p:'matrix'}]}]};
let curNav='dashboard';
function nav(el){document.querySelectorAll('.ti').forEach(e=>e.classList.remove('on'));el.classList.add('on');curNav=el.dataset.pg;buildSB(curNav);go(curNav);}
function buildSB(n){document.getElementById('sb').innerHTML=(SBs[n]||[]).map(s=>`<div class="sl">${s.lbl}</div>${s.items.map(i=>`<div class="si" onclick="go('${i.p}')">${i.i} ${i.t}</div>`).join('')}<div class="sdiv"></div>`).join('');}
function go(pg){document.querySelectorAll('.si').forEach(el=>el.classList.toggle('on',el.getAttribute('onclick')&&el.getAttribute('onclick').includes(`'${pg}'`)));({dashboard:pgDash,customers:pgCusts,cust_new:()=>pgCustF(null),quotes:pgQuotes,quote_new:()=>pgQF(null),receipts:pgReceipts,receipt_new:()=>pgRF(null),production:pgProd,payroll:pgPay,settings:pgSettings,matrix:pgMx}[pg]||pgDash)();}

function modal(title,body,footer){document.getElementById('mo').innerHTML=`<div class="moh"><span>${title}</span><button class="mx" onclick="closeM()">\u00d7</button></div><div class="mob">${body}</div><div class="mof">${footer||''}</div>`;document.getElementById('ov').classList.remove('hidden');}

function pgCusts(){

function saveC(eid){const g=id=>(document.getElementById(id)||{}).value||'';if(!g('cn').trim()){alert('Name required');return;}const d={name:g('cn'),phone:g('cph'),email:g('cem'),a1:g('ca1'),a2:g('ca2'),a3:g('ca3'),post:g('cpo'),vat:g('cvat'),credit:+g('ccr'),bal:+g('cb'),rep:g('crep')};if(eid&&eid!=='null')Object.assign(DB.customers.find(c=>c.id===eid),d);else DB.customers.push({id:nid('c'),...d});go('customers');}

function filterQt(v){document.getElementById('qtbody').innerHTML=rQuotes(v);}

function csF(v,sid){
  const dd=document.getElementById('cs_dd');if(!dd)return;
  const f=DB.customers.filter(c=>!v||c.name.toLowerCase().includes(v.toLowerCase())||c.phone.includes(v));
  if(sid){const c=DB.customers.find(x=>x.id===sid);if(c){selCID=c.id;updCustInfo(c);return;}}
  dd.innerHTML=f.map(c=>`<div class="cd-item" onclick="csSel(${c.id})">${c.name} <span style="color:var(--txt3)">${c.phone}</span></div>`).join('')+`<div class="cd-add" onclick="qcAdd()">+ Add new customer</div>`;
  dd.classList.toggle('hidden',!v||f.length===0);
  document.getElementById('cs_inp').focus();}

function csSel(id){
  const c=DB.customers.find(x=>x.id===id);if(!c)return;
  selCID=c.id;
  const dd=document.getElementById('cs_dd');if(dd)dd.classList.add('hidden');
  const inp=document.getElementById('cs_inp');if(inp)inp.value=c.name;
  updCustInfo(c);updRBal();}

function updCustInfo(c){
  const del=document.getElementById('qdel');if(del)del.value=[c.a1,c.a2,c.a3].filter(Boolean).join(', ')+'\n'+c.phone+'\n'+c.email;
  const rep=document.getElementById('qrep');if(rep&&c.rep)rep.value=c.rep;
  const bal=document.getElementById('qbal');if(bal)bal.value=fmt(c.bal);
  const cl=document.getElementById('qcl');if(cl)cl.value=fmt(c.credit);
  const ph=document.getElementById('qphone');if(ph)ph.value=c.phone;}

function clrC(){
  selCID=null;
  const dd=document.getElementById('cs_dd');if(dd)dd.classList.add('hidden');
  const inp=document.getElementById('cs_inp');if(inp)inp.value='';
  ['qdel','qbal','qcl','qphone','qdelivery'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});}

function qcAdd(){
  modal('Quick Add Customer',`<table class="ft"><tr><td class="lb">Customer Name *</td><td><input class="fi" id="qcn"/></td></tr><tr><td class="lb">Phone</td><td><input class="fi" id="qcp"/></td></tr><tr><td class="lb">Email</td><td><input class="fi" id="qce"/></td></tr></table>`,`<button class="btn bd" onclick="closeM()">Cancel</button><button class="btn bp" onclick="qcSave()">Save</button>`);}
function qcSave(){
  const name=document.getElementById('qcn').value.trim();if(!name){alert('Name required');return;}
  const c={id:nid('c'),name,phone:document.getElementById('qcp').value,email:document.getElementById('qce').value,a1:'',a2:'',a3:'',post:'',vat:'',credit:0,bal:0,rep:''};
  DB.customers.push(c);closeM();csSel(c.id);}

function addItem(){LI.push(mkLI());rLI();}
function rmItem(i){if(LI.length>1){LI.splice(i,1);rLI();}else{LI=[];rLI();}}

function cQ(){
  const sub=LI.reduce((s,i)=>s+(widthHeightSet(i)?iPrice(i):0),0);
  const idisc=LI.reduce((s,i)=>s+(i.disc||0),0);
  const qdisc=+(document.getElementById('qdisc')||{}).value||0;
  const td=idisc+qdisc;const grand=sub-td;
  const sv=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  sv('ftsub',fmt(sub));sv('ttsub',fmt(sub));
  sv('ttidisc',fmt(idisc));sv('ttqdisc',fmt(qdisc));
  sv('ttgrand',fmt(Math.max(0,grand)));}

function sendToProd(id){
  if(!confirm('Send this quote to production? This will auto-create production stages for all items.'))return;
  const q=DB.quotes.find(x=>x.id===id);if(!q)return;
  q.stat='In Progress';
  const its=DB.items.filter(i=>i.qid===id);
  its.forEach(item=>{
    const stages=FRAME_STAGES[item.ft]||FRAME_STAGES['Floating Frame'];
    stages.forEach(sk=>{
      if(!DB.tracker.find(t=>t.jid===item.id&&t.sk===sk))
        DB.tracker.push({id:nid('t'),jid:item.id,sk,artisans:'',date:null,dateOverride:null});
    });
  });
  pgProd();}

function toggleQD(id,el){
  document.querySelectorAll('.adrop.show').forEach(d=>{if(d.id!=='ad_'+id)d.classList.remove('show');});
  const dd=document.getElementById('ad_'+id);if(!dd)return;
  dd.classList.toggle('show');
  if(dd.classList.contains('show')){
    const td=el.closest('td');const tr=td.closest('tr');
    const rect=td.getBoundingClientRect();
    dd.style.top='';dd.style.bottom='';dd.style.right='';dd.style.left='';
    const spaceBtm=window.innerHeight-rect.bottom;
    if(spaceBtm<180){dd.classList.add('up');dd.style.bottom=(tr.offsetHeight)+'px';}
    else{dd.classList.remove('up');dd.style.top='0';}
    dd.style.right='0';
    requestAnimationFrame(()=>{
      const dr=dd.getBoundingClientRect();
      if(dr.right>window.innerWidth-4){
        dd.style.right='auto';dd.style.left=Math.max(-4,window.innerWidth-4-dr.width-rect.left)+'px';
      }
      if(dr.left<0){
        dd.style.left='0';dd.style.right='auto';
      }
    });
  }}

function updRBal(){
  const tb=document.getElementById('rInvBody');if(!tb)return;
  if(!selCID){tb.innerHTML='<tr><td colspan="6" class="empty" style="padding:24px;font-style:italic">Select a customer to view unpaid invoices</td></tr>';return;}
  const upQ=DB.quotes.filter(q=>q.cid===selCID&&q.stat!=='Completed');
  if(!upQ.length){tb.innerHTML='<tr><td colspan="6" class="empty" style="padding:24px;font-style:italic">No unpaid invoices for this customer</td></tr>';return;}
  const amt=+(document.getElementById('rAmt')||{}).value||0;
  tb.innerHTML=upQ.map(q=>{const t=qT(q.id);return`<tr><td style="text-align:center"><input type="checkbox" value="${q.id}" checked onchange="updRBal()" style="accent-color:#1d4ed8"/></td><td><code style="font-size:11px">Q-${String(q.id).padStart(4,'0')}</code></td><td>${fd(q.date)}</td><td class="money">${fmt(t.grand)}</td><td class="money mr">${fmt(t.grand)}</td><td class="money mg" style="font-weight:700">${fmt(amt)}</td></tr>`;}).join('');}

function saveR(eid,action){
  if(!selCID){alert('Please select a customer');return;}
  const amt=+(document.getElementById('rAmt').value||0);if(amt<=0){alert('Enter a valid payment amount');return;}
  const method=document.querySelector('input[name="rpm"]:checked')?.value||'Cash';
  const date=document.getElementById('rDt').value;
  const desc=document.getElementById('rDesc').value;
  const notes=document.getElementById('rComm').value;
  const qids=[...document.querySelectorAll('#rInvBody input[type="checkbox"]:checked')].map(c=>+c.value).filter(Boolean);
  if(!qids.length){alert('Allocate at least one unpaid invoice');return;}
  const totalO=qids.reduce((s,qid)=>s+qT(qid).grand,0);
  const d={cid:selCID,date,amount:amt,method,ref:desc,qids,notes};
  if(eid&&eid!=='null')Object.assign(DB.receipts.find(r=>r.id===eid),d);
  else{DB.receipts.push({id:nid('r'),...d});}
  const sid=eid&&eid!=='null'?eid:(DB.ids.r-1);
  if(amt>=totalO){qids.forEach(qid=>{const q=DB.quotes.find(x=>x.id===qid);if(q)q.stat='Completed';});}
  if(action==='new'){selCID=null;pgRF(null);}
  else{if(action==='print')printR(sid);if(action==='email')emailR(sid);go('receipts');}}

h1{font-size:18px;margin-bottom:4px}.hdr{display:flex;justify-content:space-between;margin-bottom:30px}
table{width:100%;border-collapse:collapse;margin-bottom:20px}
th{background:#2c3e50;color:#fff;padding:6px 9px;font-size:11px;text-align:left;font-weight:600}
td{padding:6px 9px;border-bottom:1px solid #dde1e7;font-size:12px}
tr:nth-child(even){background:#f9fafb}.right{text-align:right}
.money{text-align:right;font-family:'Courier New',monospace;font-weight:600}
.msg{font-size:11px;color:#4a5568;white-space:pre-line;padding:10px;background:#f9fafb;border-radius:3px;margin-bottom:10px}
.footer{margin-top:40px;font-size:10px;color:#8a94a6;text-align:center;border-top:1px solid #dde1e7;padding-top:10px}

@media print{body{padding:20px}}
</style></head><body>
<h1>FrameERP &mdash; Payment Receipt</h1>
<div class="hdr"><div><strong>${cu?cu.name:'\u2014'}</strong><br>${cu?cu.phone:''}<br>${cu?cu.email:''}</div><div class="right"><strong>Receipt #: R-${String(id).padStart(4,'0')}</strong><br>Date: ${fd(r.date)}<br>Method: ${r.method}<br>Ref: ${r.ref||'\u2014'}</div></div>
<div class="msg"><strong>Quotes Paid:</strong> ${(r.qids||[]).map(qid=>`Q-${String(qid).padStart(4,'0')}`).join(', ')||'\u2014'}</div>
<div style="border:2px solid #16a34a;border-radius:6px;padding:24px;text-align:center;margin:20px 0">
  <div style="font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Amount Received</div>
  <div class="big">${fmt(r.amount)}</div>
</div>
<div class="footer">FrameERP &mdash; Generated ${new Date().toLocaleString('en-GB')}</div>
<s${'cript'}>window.print();window.close();</s${'cript'}></body></html>`);
  w.document.close();}

function pgProd(){
  const aQs=DB.quotes.filter(q=>q.stat==='In Progress'||q.stat==='Quoted');
  const aJs=DB.items.filter(i=>aQs.some(q=>q.id===i.qid)).filter(i=>!jDone(i.id));
  const cJs=DB.items.filter(i=>aQs.some(q=>q.id===i.qid)).filter(i=>jDone(i.id));
  const allTr=id=>DB.tracker.filter(t=>t.jid===id);
  set(`<div class="ph"><div class="pt">Production Tracker</div><div class="ps">${aJs.length} active, ${cJs.length} completed</div></div>
  <div style="padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="pnl" style="margin:0"><div class="pnlh">Active Jobs (${aJs.length})</div>
      <div style="padding:8px">${aJs.length?aJs.map(j=>{const q=DB.quotes.find(x=>x.id===j.qid);const c=DB.customers.find(x=>x.id===q.cid);const t=sTier(j.width,j.height);const stages=allTr(j.id);const st=s=>{const tr=stages.find(x=>x.sk===s);if(!tr)return'pending';return tr.date?'done':tr.artisans?'assigned':'pending';};return`<div class="jcard"><div class="jch"><div><span class="jcn">#J${j.id} \u2014 ${j.ft}</span><span class="jcs"> ${c?c.name:''} \u00b7 ${t} \u00b7 ${j.width}\u00d7${j.height}${j.unit}</span></div><span class="sp ${st('Assembly')==='done'?'sco':'sdr'}" style="font-size:9px">${jStatus(j.id)}</span></div><div class="jcb">${(FRAME_STAGES[j.ft]||FRAME_STAGES['Floating Frame']).map(sk=>{const tr=stages.find(x=>x.sk===sk);const stt=st(sk);const amt=gComm(t,sk);return`<div class="pstage"><span class="psname">${SL[sk]||sk}</span><span class="psart">${tr&&tr.artisans?tr.artisans.split(',').map(n=>`<span>${n.trim()}</span>`):'<span style="color:var(--txt3)">Unassigned</span>'}</span><span class="psamt mg">${amt?fmt(amt):'\u2014'}</span><span class="psact">${stt==='done'?'<span class="sp sco">\u2713</span>':`<button class="btn bxs ${tr&&tr.artisans?'bd':'bp'}" onclick="asSt(${tr?tr.id:''},${j.id},'${sk}')">${tr&&tr.artisans?'Edit':'Assign'}</button>${tr&&tr.artisans&&!tr.date?` <button class="btn bxs bg" onclick="cmpSt(${tr.id},${j.id})">Done</button>`:''}`}</span></div>`;}).join('')}</div></div>`;}).join(''):'<div class="empty">No active production jobs</div>'}</div></div>
    <div class="pnl" style="margin:0"><div class="pnlh">Completed Jobs (${cJs.length})</div>
      <table class="dt"><thead><tr><th>Job ID</th><th>Frame</th><th>Client</th><th>Size</th><th>Stages</th></tr></thead><tbody>${cJs.length?cJs.map(j=>{const q=DB.quotes.find(x=>x.id===j.qid);const c=DB.customers.find(x=>x.id===q.cid);const t=sTier(j.width,j.height);const stages=allTr(j.id);return`<tr><td><code>#J${j.id}</code></td><td style="font-weight:600">${j.ft}</td><td>${c?c.name:''}</td><td>${j.width}\u00d7${j.height}</td><td><span class="sp ${tc(t)}">${t}</span> \u00b7 ${stages.filter(x=>x.date).length}/${stages.length}</td></tr>`;}).join(''):'<tr><td colspan="5" class="empty">No completed jobs</td></tr>'}</tbody></table></div>
  </div>
  <div class="pnl"><div class="pnlh">Stage Completion Overview</div><div style="padding:12px">${STAGES.map(s=>{const cnt=DB.tracker.filter(t=>t.date&&t.sk===s.key).length;return`<div style="display:flex;align-items:center;gap:9px;margin-bottom:6px"><span style="width:115px;font-size:11px;font-weight:600;color:var(--txt2)">${s.label}</span><div style="flex:1;height:5px;background:#e2e8f0;border-radius:3px"><div style="height:100%;width:${Math.min(cnt*20,100)}%;background:var(--bl);border-radius:3px"></div></div><span style="font-size:11px;font-weight:700;width:18px;text-align:right">${cnt}</span></div>`;}).join('')}</div></div>`);}

function asSt(tid,jid,sk){
  const tr=tid?DB.tracker.find(t=>t.id===tid):null;
  const sel=tr?tr.artisans.split(',').map(s=>s.trim()).filter(Boolean):[];
  modal('Assign Artisans',`<div style="font-size:12px;color:var(--txt2);margin-bottom:10px">Stage: <strong>${SL[sk]||sk}</strong> &mdash; Job #J${jid}</div>
  <div style="font-size:11px;color:var(--txt3);margin-bottom:8px">Select artisan(s) for this stage (hold Ctrl/Cmd for multiple):</div>
  <select class="fi" id="asSel" multiple size="6">${DB.salesReps.map(a=>`<option value="${a}"${sel.includes(a)?' selected':''}>${a}</option>`).join('')}</select>
  <div style="font-size:10px;color:var(--txt3);margin-top:4px">Commission splits evenly among selected artisans</div>`,`<button class="btn bd" onclick="closeM()">Cancel</button><button class="btn bp" onclick="asSave(${tid||'null'},${jid},'${sk}')">Save</button>`);}
function asSave(tid,jid,sk){
  const el=document.getElementById('asSel');if(!el){closeM();return;}
  const names=[...el.selectedOptions].map(o=>o.value);
  if(!names.length){alert('Select at least one artisan');return;}
  if(tid&&tid!=='null'){const tr=DB.tracker.find(t=>t.id===tid);if(tr)tr.artisans=names.join(', ');}
  else{DB.tracker.push({id:nid('t'),jid,sk,artisans:names.join(', '),date:null,dateOverride:null});}
  closeM();pgProd();}

function cmpSt(tid,jid){
  const tr=DB.tracker.find(t=>t.id===tid);if(!tr)return;
  modal('Complete Stage',`<div style="font-size:12px;color:var(--txt2);margin-bottom:10px">Mark <strong>${SL[tr.sk]||tr.sk}</strong> as complete for Job #J${jid}?</div>
  <table class="ft"><tr><td class="lb">Date Completed</td><td><input class="fi" type="date" id="cdt" value="${new Date().toISOString().split('T')[0]}"/></td></tr><tr><td class="lb">Date Override</td><td><input class="fi" type="date" id="cdo" placeholder="Optional"/><div style="font-size:10px;color:var(--txt3);margin-top:2px">For split-week payroll adjustments</div></td></tr></table>`,`<button class="btn bd" onclick="closeM()">Cancel</button><button class="btn bp" onclick="cmpSave(${tid})">Complete Stage</button>`);}
function cmpSave(tid){
  const tr=DB.tracker.find(t=>t.id===tid);if(!tr)return;
  tr.date=document.getElementById('cdt').value||tr.date;
  tr.dateOverride=document.getElementById('cdo').value||null;
  closeM();pgProd();}

function pgPay(){
  const{mo,su}=wkRange();
  const artMap={};
  DB.tracker.forEach(tr=>{
    if(!tr.date)return;const eff=effDate(tr);
    if(!isWk(eff))return;
    const{each,names}=spComm(tr);
    names.forEach(name=>{
      if(!artMap[name])artMap[name]={logs:[],total:0};
      artMap[name].logs.push({...tr,share:each});
      artMap[name].total+=each;
    });
  });
  const allArt=[...new Set(DB.tracker.filter(t=>t.date).map(t=>t.artisans?t.artisans.split(',').map(s=>s.trim()).filter(Boolean):[]).flat())].sort();
  const totWeek=Object.values(artMap).reduce((s,a)=>s+a.total,0);
  set(`<div class="ph"><div class="pt">Weekly Payroll</div><div class="ps">${fdl(mo.toISOString().split('T')[0])} \u2013 ${fdl(su.toISOString().split('T')[0])}</div></div>
  <div class="kbar" style="grid-template-columns:repeat(${Math.min(allArt.length+1,5)},1fr)"><div class="kb g"><div class="kl">Total This Week</div><div class="kv mg">${fmt(totWeek)}</div><div class="ks">${Object.values(artMap).reduce((s,a)=>s+a.logs.length,0)} stages</div></div>${allArt.map(a=>{const d=artMap[a];return`<div class="kb ${d?'g':''}"><div class="kl">${a}</div><div class="kv" style="color:${d?'var(--gn)':'var(--txt3)'}">${fmt(d?d.total:0)}</div><div class="ks">${d?d.logs.length:0} stages</div></div>`;}).join('')}</div>
  <div style="padding:0 12px 12px">${allArt.length===0?`<div class="pnl"><div style="padding:40px;text-align:center;color:var(--txt3)">No completed production stages for this week. Complete stages in Production Tracker.</div></div>`:allArt.map(art=>{const{logs,total}=artMap[art];return`<div class="pw"><div class="pwh"><div class="pwn">\ud83d\udea7 ${art}</div><div style="text-align:right"><div style="font-size:9px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px">Weekly Payslip Total</div><div class="pwt">${fmt(total)}</div></div></div><table class="dt"><thead><tr><th>Job ID</th><th>Frame Type</th><th>Size</th><th>Tier</th><th>Stage</th><th>Artisans</th><th>Date (Effective)</th><th>Commission</th></tr></thead><tbody>${logs.map(l=>{const j=DB.items.find(x=>x.id===l.jid);const t=j?sTier(j.width,j.height):'Small';const eff=effDate(l);return`<tr><td><code>#J${l.jid}</code></td><td style="font-weight:600">${j?j.ft:'\u2014'}</td><td>${j?j.width+'\u00d7'+j.height:'\u2014'}</td><td><span class="sp ${tc(t)}">${t}</span></td><td>${SL[l.sk]||l.sk}</td><td style="color:${l.artisans&&l.artisans.includes(',')?'var(--or)':'var(--txt2)'};font-size:11px">${l.artisans}</td><td>${fdl(eff)}${l.dateOverride?` <span style="color:var(--or);font-size:10px">(override)</span>`:''}</td><td class="money mg" style="font-weight:700">${fmt(l.share)}</td></tr>`;}).join('')}</tbody><tfoot><tr><td colspan="7" style="text-align:right">Total Payable to ${art}</td><td class="money mg" style="font-size:14px">${fmt(total)}</td></tr></tfoot></table></div>`;}).join('')}</div>`);}

function pgSettings(){
  const sum=s=>STAGES.reduce((t,st)=>t+CM[s][st.key],0);
  set(`<div class="ph"><div class="pt">Settings</div><div class="ptb"><button class="btn bp" onclick="saveSettings()">Save Settings</button></div></div>
  <div style="padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
    <div class="pnl" style="margin:0"><div class="pnlh">Sales Representatives</div><div style="padding:12px">
      <div id="srepList">${DB.salesReps.map((r,i)=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><input class="fi" value="${r}" id="sr_${i}" style="flex:1"/><button class="btn bxs bir" onclick="rmRep(${i})">\u2716</button></div>`).join('')}</div>
      <button class="btn bsm bd" onclick="addRep()" style="margin-top:6px">+ Add Sales Rep</button>
    </div></div>
    <div class="pnl" style="margin:0"><div class="pnlh">Commission Rates (\u20a6)</div><div style="padding:12px;font-size:11px">
      <table class="dt"><thead><tr><th>Stage</th><th>Small</th><th>Medium</th><th>Large</th></tr></thead><tbody>${STAGES.map(s=>`<tr><td style="font-weight:600">${s.label}</td>${['Small','Medium','Large'].map(t=>`<td><input class="qi" type="number" id="cm_${t}_${s.key}" value="${CM[t][s.key]}" style="text-align:right;width:70px"/></td>`).join('')}</tr>`).join('')}</tbody><tfoot><tr><td>Total</td>${['Small','Medium','Large'].map(t=>`<td class="money mb">${fmt(sum(t))}</td>`).join('')}</tr></tfoot></table>
    </div></div>
  </div>
  <div style="padding:0 12px 12px;display:flex;gap:7px"><button class="btn bp" onclick="saveSettings()">Save Settings</button><button class="btn bd" onclick="go('dashboard')">Cancel</button></div>`);}
let srCount=0;
function addRep(){srCount=DB.salesReps.length;DB.salesReps.push('');document.getElementById('srepList').insertAdjacentHTML('beforeend',`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><input class="fi" id="sr_${srCount}" value="" placeholder="New rep name" style="flex:1"/></div>`);srCount++;}
function rmRep(i){if(DB.salesReps.length<=1){alert('Need at least one rep');return;}DB.salesReps.splice(i,1);pgSettings();}
function saveSettings(){
  DB.salesReps=[];let i=0;
  while(document.getElementById(`sr_${i}`)){const v=document.getElementById(`sr_${i}`).value.trim();if(v)DB.salesReps.push(v);i++;}
  if(!DB.salesReps.length)DB.salesReps=['Kunle'];
  STAGES.forEach(s=>['Small','Medium','Large'].forEach(t=>{const e=document.getElementById(`cm_${t}_${s.key}`);if(e)CM[t][s.key]=+e.value||0;}));
  alert('Settings saved successfully');go('dashboard');}

function pgMx(){
  const sum=s=>STAGES.reduce((t,st)=>t+CM[s][st.key],0);
  set(`<div class="ph"><div class="pt">Commission Matrix</div><div class="ptb"><button class="btn bd" onclick="go('settings')">Edit in Settings</button></div></div>
  <div class="pnl"><div class="pnlh">Piece-Rate Payout by Frame Type & Stage</div><table class="dt"><thead><tr><th>Production Stage</th>${['Small','Medium','Large'].map(t=>`<th style="text-align:center"><span class="sp ${tc(t)}">${t}</span><div style="font-size:9px;color:rgba(255,255,255,.55);font-weight:400">${{Small:'<60\u00d790cm',Medium:'60\u201370\u00d790\u2013140cm',Large:'\u226580\u00d7160cm'}[t]}</div></th>`).join('')}</tr></thead><tbody>${STAGES.map(s=>`<tr><td style="font-weight:600">${s.label}</td>${['Small','Medium','Large'].map(t=>`<td class="money mg">${fmt(CM[t][s.key])}</td>`).join('')}</tr>`).join('')}</tbody><tfoot><tr><td>Total per job</td>${['Small','Medium','Large'].map(t=>`<td class="money mb">${fmt(sum(t))}</td>`).join('')}</tr></tfoot></table></div>
  <div class="pnl"><div class="pnlh">Frame Type &rarr; Production Stages</div><table class="dt"><thead><tr><th>Frame Type</th><th>Stages</th></tr></thead><tbody>${Object.entries(FRAME_STAGES).map(([ft,stg])=>`<tr><td style="font-weight:600">${ft}</td><td><span style="color:var(--txt2);font-size:11px">${stg.map(s=>SL[s]||s).join(' \u2192 ')}</span></td></tr>`).join('')}</tbody></table></div>`);}

document.getElementById('hd').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short',year:'numeric'});
buildSB('dashboard');pgDash();
</script></body></html>
